<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bean Machine — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown-deep: #1C1008;
      --brown-dark: #2E1A0E;
      --brown-mid: #3B2A1A;
      --brown-light: #5C3D1E;
      --gold: #C9A84C;
      --gold-light: #E2C47A;
      --cream: #F5EDD8;
      --text-light: #D4B896;
      --text-muted: #8A6A4A;
      --sidebar: 240px;
      --success: #27AE60;
      --warning: #F39C12;
      --error: #C0392B;
      --info: #2980B9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--brown-deep);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: var(--sidebar);
      background: var(--brown-dark);
      border-right: 1px solid rgba(201, 168, 76, 0.1);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 50;
    }

    .sidebar-logo {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .sidebar-logo span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--gold);
    }

    .sidebar-role {
      padding: 0.75rem 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(201, 168, 76, 0.08);
    }

    .sidebar-nav {
      flex: 1;
      padding: 1rem 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-muted);
      transition: all 0.2s;
      border-left: 3px solid transparent;
      text-decoration: none;
    }

    .nav-item:hover {
      color: var(--text-light);
      background: rgba(201, 168, 76, 0.05);
    }

    .nav-item.active {
      color: var(--gold);
      border-left-color: var(--gold);
      background: rgba(201, 168, 76, 0.08);
    }

    .nav-item .icon { font-size: 1rem; width: 20px; }

    .nav-section-label {
      padding: 1rem 1.5rem 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid rgba(201, 168, 76, 0.1);
    }

    .logout-btn {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(192, 57, 43, 0.3);
      color: #E74C3C;
      padding: 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(192, 57, 43, 0.1);
      border-color: #E74C3C;
    }

    /* ─── MAIN ─── */
    .main {
      margin-left: var(--sidebar);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(28, 16, 8, 0.5);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      color: var(--cream);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .badge-role {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--gold);
    }

    /* ─── CONTENT PANELS ─── */
    .content {
      padding: 2rem;
      flex: 1;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* ─── STATS CARDS ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--brown-dark);
      border: 1px solid rgba(201, 168, 76, 0.1);
      padding: 1.2rem 1.5rem;
    }

    .stat-card-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .stat-card-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    /* ─── ORDERS ─── */
    .orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: gap;
      gap: 1rem;
    }

    .orders-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
    }

    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: var(--text-muted);
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab:hover, .filter-tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--brown-deep);
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .order-card {
      background: var(--brown-dark);
      border: 1px solid rgba(201, 168, 76, 0.08);
      padding: 1.2rem 1.5rem;
      transition: border-color 0.2s;
    }

    .order-card:hover {
      border-color: rgba(201, 168, 76, 0.2);
    }

    .order-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .order-id {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    .order-customer {
      font-size: 0.9rem;
      color: var(--cream);
    }

    .order-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      font-weight: 500;
    }

    .status-pending { background: rgba(243, 156, 18, 0.15); color: #F39C12; border: 1px solid rgba(243, 156, 18, 0.3); }
    .status-preparing { background: rgba(41, 128, 185, 0.15); color: #5DADE2; border: 1px solid rgba(41, 128, 185, 0.3); }
    .status-ready { background: rgba(39, 174, 96, 0.15); color: #2ECC71; border: 1px solid rgba(39, 174, 96, 0.3); }
    .status-done { background: rgba(138, 106, 74, 0.15); color: var(--text-muted); border: 1px solid rgba(138, 106, 74, 0.3); }
    .status-cancelled { background: rgba(192, 57, 43, 0.15); color: #E74C3C; border: 1px solid rgba(192, 57, 43, 0.3); }

    .order-items-list {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    .order-note {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 0.75rem;
    }

    .order-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .order-total {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      color: var(--gold);
    }

    .order-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 0.4rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
      background: transparent;
    }

    .btn-prepare { color: #5DADE2; border-color: rgba(41, 128, 185, 0.4); }
    .btn-prepare:hover { background: rgba(41, 128, 185, 0.15); }

    .btn-ready { color: #2ECC71; border-color: rgba(39, 174, 96, 0.4); }
    .btn-ready:hover { background: rgba(39, 174, 96, 0.15); }

    .btn-done { color: var(--text-muted); border-color: rgba(138, 106, 74, 0.4); }
    .btn-done:hover { background: rgba(138, 106, 74, 0.15); }

    .btn-cancel { color: #E74C3C; border-color: rgba(192, 57, 43, 0.4); }
    .btn-cancel:hover { background: rgba(192, 57, 43, 0.15); }

    /* ─── MENU MANAGEMENT ─── */
    .menu-mgmt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .btn-add {
      background: var(--gold);
      color: var(--brown-deep);
      padding: 0.6rem 1.5rem;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover { background: var(--gold-light); }

    .menu-table {
      width: 100%;
      border-collapse: collapse;
    }

    .menu-table th {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.12);
      text-align: left;
    }

    .menu-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(201, 168, 76, 0.06);
      font-size: 0.88rem;
      vertical-align: middle;
    }

    .menu-table tr:hover td {
      background: rgba(201, 168, 76, 0.03);
    }

    .td-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-edit, .btn-delete {
      padding: 0.3rem 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-edit { color: var(--gold); border-color: rgba(201, 168, 76, 0.3); }
    .btn-edit:hover { background: rgba(201, 168, 76, 0.1); }

    .btn-delete { color: #E74C3C; border-color: rgba(192, 57, 43, 0.3); }
    .btn-delete:hover { background: rgba(192, 57, 43, 0.1); }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--brown-dark);
      border: 1px solid rgba(201, 168, 76, 0.2);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .form-group input, .form-group select, .form-group textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: var(--cream);
      padding: 0.65rem 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold);
    }

    .form-group select option { background: var(--brown-dark); }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-save {
      background: var(--gold);
      color: var(--brown-deep);
      padding: 0.7rem 1.5rem;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      flex: 1;
    }

    .btn-save:hover { background: var(--gold-light); }

    .btn-cancel-modal {
      background: transparent;
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: var(--text-muted);
      padding: 0.7rem 1.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel-modal:hover { border-color: var(--gold); color: var(--cream); }

    /* ─── SETTINGS ─── */
    .settings-section {
      background: var(--brown-dark);
      border: 1px solid rgba(201, 168, 76, 0.1);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .settings-section h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .settings-row {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
    }

    .settings-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--brown-mid);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--cream);
      padding: 0.9rem 1.5rem;
      font-size: 0.85rem;
      z-index: 500;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo span, .sidebar-role, .nav-item span, .nav-section-label, .sidebar-footer { display: none; }
      .main { margin-left: 60px; }
      .nav-item { justify-content: center; padding: 0.75rem; }
      .content { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="IMG_0304.PNG" alt="BM">
      <span>Bean Machine</span>
    </div>
    <div class="sidebar-role" id="sidebarRole">Chargement...</div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item active" onclick="showPanel('orders')" href="#">
        <span class="icon">📋</span>
        <span>Commandes</span>
      </a>

      <div class="nav-section-label" id="menuNavLabel">Menu</div>
      <a class="nav-item" id="menuNavItem" onclick="showPanel('menu')" href="#">
        <span class="icon">☕</span>
        <span>Gestion du menu</span>
      </a>

      <div class="nav-section-label" id="adminNavLabel">Administration</div>
      <a class="nav-item" id="settingsNavItem" onclick="showPanel('settings')" href="#">
        <span class="icon">⚙️</span>
        <span>Paramètres</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Commandes</div>
      <div class="topbar-right">
        <span class="badge-role" id="roleBadge">—</span>
      </div>
    </div>

    <div class="content">

      <!-- ── ORDERS PANEL ── -->
      <div class="panel active" id="panel-orders">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="orders-header">
          <div class="orders-title">Commandes en cours</div>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOrders('all', this)">Toutes</button>
            <button class="filter-tab" onclick="filterOrders('pending', this)">En attente</button>
            <button class="filter-tab" onclick="filterOrders('preparing', this)">En préparation</button>
            <button class="filter-tab" onclick="filterOrders('ready', this)">Prêtes</button>
            <button class="filter-tab" onclick="filterOrders('done', this)">Récupérées</button>
          </div>
        </div>

        <div class="orders-list" id="ordersList"></div>
      </div>

      <!-- ── MENU PANEL ── -->
      <div class="panel" id="panel-menu">
        <div class="menu-mgmt-header">
          <div class="orders-title">Gestion du menu</div>
          <button class="btn-add" onclick="openItemModal()">+ Ajouter un produit</button>
        </div>
        <div style="overflow-x:auto">
          <table class="menu-table">
            <thead>
              <tr>
                <th>Nom</th>
                <th>Catégorie</th>
                <th>Description</th>
                <th>Prix</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="menuTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- ── SETTINGS PANEL ── -->
      <div class="panel" id="panel-settings">
        <div class="settings-section" id="webhookSection">
          <h3>🔔 Webhook Discord</h3>
          <div class="settings-row">
            <div class="form-group">
              <label>URL du Webhook</label>
              <input type="text" id="webhookInput" placeholder="https://discord.com/api/webhooks/...">
            </div>
            <button class="btn-save" style="flex:0; padding: 0.65rem 1.5rem;" onclick="saveWebhook()">Enregistrer</button>
          </div>
        </div>

        <div class="settings-section" id="passwordsSection">
          <h3>🔒 Mots de passe</h3>
          <div class="form-group">
            <label>Mot de passe Employé</label>
            <input type="password" id="pwEmployee" placeholder="bm-employee">
          </div>
          <div class="form-group">
            <label>Mot de passe Manager</label>
            <input type="password" id="pwManager" placeholder="bm-manager">
          </div>
          <div class="form-group">
            <label>Mot de passe Administrateur</label>
            <input type="password" id="pwAdmin" placeholder="bm-admin">
          </div>
          <button class="btn-save" onclick="savePasswords()">Mettre à jour les mots de passe</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ITEM MODAL -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal">
      <h3 id="modalTitle">Nouveau produit</h3>
      <input type="hidden" id="editItemId">

      <div class="form-group">
        <label>Nom du produit *</label>
        <input type="text" id="itemName" placeholder="Espresso Double Shot">
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <input type="text" id="itemCategory" placeholder="Café, Boisson froide, Snack...">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="itemDesc" rows="2" placeholder="Un café intense, pour les durs de Los Santos."></textarea>
      </div>
      <div class="form-group">
        <label>Prix ($) *</label>
        <input type="number" id="itemPrice" step="0.01" min="0" placeholder="4.50">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeItemModal()">Annuler</button>
        <button class="btn-save" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    let currentRole = sessionStorage.getItem('bm_role');
    let currentOrderFilter = 'all';

    if (!currentRole) {
      window.location.href = 'login.html';
    }

    const ROLE_LABELS = { employee: 'Employé', manager: 'Manager', admin: 'Administrateur' };
    const STATUS_LABELS = { pending: 'En attente', preparing: 'En préparation', ready: 'Prête', done: 'Récupérée', cancelled: 'Annulée' };

    function init() {
      document.getElementById('sidebarRole').textContent = ROLE_LABELS[currentRole] || currentRole;
      document.getElementById('roleBadge').textContent = ROLE_LABELS[currentRole] || currentRole;

      // Role-based visibility
      const canManageMenu = ['manager', 'admin'].includes(currentRole);
      const canAccessSettings = currentRole === 'admin';

      document.getElementById('menuNavItem').style.display = canManageMenu ? '' : 'none';
      document.getElementById('menuNavLabel').style.display = canManageMenu ? '' : 'none';
      document.getElementById('settingsNavItem').style.display = canAccessSettings ? '' : 'none';
      document.getElementById('adminNavLabel').style.display = canAccessSettings ? '' : 'none';

      // Load webhook in settings
      document.getElementById('webhookInput').value = localStorage.getItem('bm_webhook') || '';

      renderStats();
      renderOrders('all');
      renderMenu();

      // Auto-refresh orders every 15s
      setInterval(() => {
        renderStats();
        renderOrders(currentOrderFilter);
      }, 15000);
    }

    // ─── PANELS ───
    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      event.currentTarget.classList.add('active');
      const titles = { orders: 'Commandes', menu: 'Gestion du menu', settings: 'Paramètres' };
      document.getElementById('topbarTitle').textContent = titles[name] || name;
    }

    // ─── STATS ───
    function renderStats() {
      const orders = getOrders();
      const pending = orders.filter(o => o.status === 'pending').length;
      const preparing = orders.filter(o => o.status === 'preparing').length;
      const ready = orders.filter(o => o.status === 'ready').length;
      const today = orders.filter(o => {
        const d = new Date(o.timestamp);
        const now = new Date();
        return d.toDateString() === now.toDateString();
      });
      const revenue = today.filter(o => o.status !== 'cancelled').reduce((s, o) => s + parseFloat(o.total), 0);

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-card-label">En attente</div>
          <div class="stat-card-value" style="color: #F39C12">${pending}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">En préparation</div>
          <div class="stat-card-value" style="color: #5DADE2">${preparing}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Prêtes</div>
          <div class="stat-card-value" style="color: #2ECC71">${ready}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">CA aujourd'hui</div>
          <div class="stat-card-value">$${revenue.toFixed(2)}</div>
        </div>
      `;
    }

    // ─── ORDERS ───
    function getOrders() {
      return JSON.parse(localStorage.getItem('bm_orders') || '[]');
    }

    function saveOrders(orders) {
      localStorage.setItem('bm_orders', JSON.stringify(orders));
    }

    function filterOrders(status, btn) {
      currentOrderFilter = status;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderOrders(status);
    }

    function renderOrders(filter) {
      let orders = getOrders();
      if (filter !== 'all') orders = orders.filter(o => o.status === filter);

      const list = document.getElementById('ordersList');
      if (orders.length === 0) {
        list.innerHTML = '<div class="empty-state">Aucune commande dans cette catégorie.</div>';
        return;
      }

      list.innerHTML = orders.map(order => {
        const time = new Date(order.timestamp).toLocaleString('fr-FR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
        const itemsText = order.items.map(i => `${i.qty}× ${i.name}`).join(' · ');

        const actions = getOrderActions(order);

        return `
          <div class="order-card">
            <div class="order-card-header">
              <div>
                <span class="order-id">${order.id}</span>
                <span class="order-customer" style="margin-left:1rem">${order.customer}</span>
                ${order.phone ? `<span style="font-size:0.78rem; color:var(--text-muted); margin-left:0.75rem">${order.phone}</span>` : ''}
              </div>
              <div style="display:flex; align-items:center; gap:0.75rem">
                <span class="order-time">${time}</span>
                <span class="status-badge status-${order.status}">${STATUS_LABELS[order.status] || order.status}</span>
              </div>
            </div>
            <div class="order-items-list">${itemsText}</div>
            ${order.note ? `<div class="order-note">📝 ${order.note}</div>` : ''}
            <div class="order-footer">
              <div class="order-total">$${order.total}</div>
              <div class="order-actions">${actions}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function getOrderActions(order) {
      const s = order.status;
      let btns = '';

      if (s === 'pending') {
        btns += `<button class="action-btn btn-prepare" onclick="updateOrderStatus('${order.id}', 'preparing')">En préparation</button>`;
        btns += `<button class="action-btn btn-cancel" onclick="updateOrderStatus('${order.id}', 'cancelled')">Annuler</button>`;
      }
      if (s === 'preparing') {
        btns += `<button class="action-btn btn-ready" onclick="updateOrderStatus('${order.id}', 'ready')">Prête</button>`;
        btns += `<button class="action-btn btn-cancel" onclick="updateOrderStatus('${order.id}', 'cancelled')">Annuler</button>`;
      }
      if (s === 'ready') {
        btns += `<button class="action-btn btn-done" onclick="updateOrderStatus('${order.id}', 'done')">Récupérée</button>`;
      }

      return btns;
    }

    function updateOrderStatus(id, newStatus) {
      const orders = getOrders();
      const order = orders.find(o => o.id === id);
      if (order) {
        order.status = newStatus;
        saveOrders(orders);
        renderStats();
        renderOrders(currentOrderFilter);
        showToast(`Commande ${id} → ${STATUS_LABELS[newStatus]}`);

        // Discord webhook notification on status update
        const webhook = localStorage.getItem('bm_webhook');
        if (webhook) {
          const colors = { preparing: 0x5DADE2, ready: 0x2ECC71, done: 0x8A6A4A, cancelled: 0xE74C3C };
          fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              embeds: [{
                title: `🔄 Statut mis à jour — ${id}`,
                color: colors[newStatus] || 0xC9A84C,
                fields: [
                  { name: 'Client', value: order.customer, inline: true },
                  { name: 'Nouveau statut', value: STATUS_LABELS[newStatus], inline: true }
                ],
                footer: { text: 'Bean Machine Coffee · Los Santos' },
                timestamp: new Date().toISOString()
              }]
            })
          }).catch(() => {});
        }
      }
    }

    // ─── MENU ───
    function getMenu() { return JSON.parse(localStorage.getItem('bm_menu') || '[]'); }
    function saveMenuData(menu) { localStorage.setItem('bm_menu', JSON.stringify(menu)); }

    function renderMenu() {
      const menu = getMenu();
      const tbody = document.getElementById('menuTableBody');
      if (menu.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted); font-style:italic">Aucun produit. Ajoutez-en un !</td></tr>`;
        return;
      }
      tbody.innerHTML = menu.map(item => `
        <tr>
          <td><strong>${item.name}</strong></td>
          <td><span style="color:var(--gold); font-size:0.8rem">${item.category || '—'}</span></td>
          <td style="color:var(--text-muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${item.description || '—'}</td>
          <td><span style="font-family:'Bebas Neue'; font-size:1.1rem; color:var(--gold)">$${parseFloat(item.price).toFixed(2)}</span></td>
          <td>
            <div class="td-actions">
              <button class="btn-edit" onclick="openItemModal('${item.id}')">Modifier</button>
              <button class="btn-delete" onclick="deleteItem('${item.id}')">Supprimer</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openItemModal(id) {
      document.getElementById('editItemId').value = id || '';
      document.getElementById('itemName').value = '';
      document.getElementById('itemCategory').value = '';
      document.getElementById('itemDesc').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('modalTitle').textContent = id ? 'Modifier le produit' : 'Nouveau produit';

      if (id) {
        const item = getMenu().find(i => i.id === id);
        if (item) {
          document.getElementById('itemName').value = item.name;
          document.getElementById('itemCategory').value = item.category || '';
          document.getElementById('itemDesc').value = item.description || '';
          document.getElementById('itemPrice').value = item.price;
        }
      }

      document.getElementById('itemModal').classList.add('open');
    }

    function closeItemModal() {
      document.getElementById('itemModal').classList.remove('open');
    }

    function saveItem() {
      const name = document.getElementById('itemName').value.trim();
      const price = parseFloat(document.getElementById('itemPrice').value);

      if (!name) { showToast('Le nom est obligatoire.'); return; }
      if (isNaN(price) || price < 0) { showToast('Prix invalide.'); return; }

      const menu = getMenu();
      const editId = document.getElementById('editItemId').value;

      const itemData = {
        name,
        category: document.getElementById('itemCategory').value.trim(),
        description: document.getElementById('itemDesc').value.trim(),
        price
      };

      if (editId) {
        const idx = menu.findIndex(i => i.id === editId);
        if (idx !== -1) menu[idx] = { ...menu[idx], ...itemData };
        showToast('Produit mis à jour ✓');
      } else {
        itemData.id = 'item-' + Date.now().toString(36);
        menu.push(itemData);
        showToast('Produit ajouté ✓');
      }

      saveMenuData(menu);
      renderMenu();
      closeItemModal();
    }

    function deleteItem(id) {
      if (!confirm('Supprimer ce produit ?')) return;
      const menu = getMenu().filter(i => i.id !== id);
      saveMenuData(menu);
      renderMenu();
      showToast('Produit supprimé.');
    }

    // ─── SETTINGS ───
    function saveWebhook() {
      const url = document.getElementById('webhookInput').value.trim();
      localStorage.setItem('bm_webhook', url);
      showToast('Webhook enregistré ✓');
    }

    function savePasswords() {
      const pw = {
        employee: document.getElementById('pwEmployee').value || undefined,
        manager: document.getElementById('pwManager').value || undefined,
        admin: document.getElementById('pwAdmin').value || undefined,
      };
      const current = JSON.parse(localStorage.getItem('bm_passwords') || '{"employee":"bm-employee","manager":"bm-manager","admin":"bm-admin"}');
      if (pw.employee) current.employee = pw.employee;
      if (pw.manager) current.manager = pw.manager;
      if (pw.admin) current.admin = pw.admin;
      localStorage.setItem('bm_passwords', JSON.stringify(current));
      document.getElementById('pwEmployee').value = '';
      document.getElementById('pwManager').value = '';
      document.getElementById('pwAdmin').value = '';
      showToast('Mots de passe mis à jour ✓');
    }

    // ─── AUTH ───
    function logout() {
      sessionStorage.removeItem('bm_role');
      window.location.href = 'login.html';
    }

    // ─── TOAST ───
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
